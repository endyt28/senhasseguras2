<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Matemático</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Senhas Seguras</h1>
        <p>Escolha o tamanho da senha (número de caracteres):</p>
        
        <input type="number" id="tamanho" min="4" max="30" value="12">
        <button onclick="gerarSenha()">Gerar Senha</button>

        <div id="resultado">
            <p>Sua senha aparecerá aqui.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
